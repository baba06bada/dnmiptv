<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xtream IPTV Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 27px;
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none;
            -webkit-user-select: none;
        }
        #app { position: relative; width: 100%; height: 100%; overflow: hidden; }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: #0a0a0a; overflow: hidden;
        }
        .screen.active { display: flex; }

        /* ========== FOCUS STILLERI (KUMANDA ICIN) ========== */
        button:focus,
        .cat-item:focus,
        .stream-item:focus,
        .episode-item:focus,
        .season-box:focus,
        .saved-panel-item:focus,
        input:focus {
            outline: none !important;
            border: 4px solid #ff0 !important;
            box-shadow: 0 0 18px 6px rgba(255,255,0,0.8) !important;
            z-index: 5;
            position: relative;
        }
        .menu-btn:focus {
            outline: none !important;
            border: 5px solid #ff0 !important;
            box-shadow: 0 0 25px 10px rgba(255,255,0,0.9) !important;
        }
        .ctrl-btn:focus {
            outline: none !important;
            border: 4px solid #ff0 !important;
            box-shadow: 0 0 15px 5px rgba(255,255,0,0.8) !important;
        }
        .back-btn:focus,
        .home-btn:focus,
        .back-btn-text:focus {
            outline: none !important;
            border: 4px solid #ff0 !important;
            box-shadow: 0 0 15px 5px rgba(255,255,0,0.8) !important;
        }
        .progress-bar:focus {
            outline: 3px solid #ff0 !important;
            box-shadow: 0 0 10px 3px rgba(255,255,0,0.7) !important;
        }

        /* ========== LOGIN ========== */
        #loginScreen.active { justify-content: center; align-items: center; }
        .login-container {
            background: #1a1a1a; padding: 45px; border-radius: 10px;
            display: flex; flex-direction: column; width: 560px; max-width: 92vw;
        }
        .login-container h2 { text-align: center; margin-bottom: 35px; font-size: 42px; color: #f0c040; }
        .login-container input {
            margin-bottom: 18px; padding: 18px; font-size: 27px;
            background: #2a2a2a; border: 2px solid #444; color: #fff; border-radius: 6px; outline: none;
        }
        .login-container input:focus { border-color: #f0c040; }
        .login-container button {
            margin-bottom: 18px; padding: 18px; font-size: 27px;
            background: #f0c040; color: #000; border: none; cursor: pointer; font-weight: bold; margin-top: 12px; border-radius: 6px;
        }
        .login-container .error-msg { color: #ff5c5c; text-align: center; margin-top: 12px; font-size: 22px; min-height: 24px; }

        .saved-panels {
            margin-top: 24px; background: #1a1a1a; padding: 20px; border-radius: 10px;
            width: 560px; max-width: 92vw; max-height: 240px; overflow-y: auto;
        }
        .saved-panels h3 { color: #f0c040; margin-bottom: 12px; font-size: 30px; }
        .saved-panel-item {
            padding: 16px; border-bottom: 2px solid #333; cursor: pointer; font-size: 24px;
        }
        .saved-panel-item:hover { background: #333; }

        /* ========== ANA MENU ========== */
        #mainMenuScreen.active { flex-direction: row; justify-content: center; align-items: center; position: relative; }
        .menu-btn {
            background: #2a2a2a; border: 3px solid #555; color: #fff;
            font-size: 42px; padding: 50px 40px; margin: 0 20px; cursor: pointer;
            border-radius: 10px; min-width: 240px; text-align: center; transition: background 0.2s;
        }
        .menu-btn:hover { background: #3a3a3a; border-color: #f0c040; }
        .panel-switch-btn {
            position: absolute; top: 20px; right: 20px;
            background: #2a2a2a; border: 3px solid #f0c040; color: #f0c040;
            padding: 15px 25px; font-size: 24px; cursor: pointer; border-radius: 8px; z-index: 10;
        }
        .panel-switch-btn:hover { background: #3a3a3a; }

        /* ========== LISTE EKRANI ========== */
        #listScreen.active { flex-direction: row; align-items: stretch; justify-content: flex-start; }
        .sidebar {
            width: 320px; min-width: 320px;
            background: #121212; overflow-y: auto; overflow-x: hidden;
            border-right: 3px solid #333; flex-shrink: 0;
        }
        .sidebar .cat-item {
            padding: 24px 20px; cursor: pointer; border-bottom: 2px solid #2a2a2a;
            font-size: 24px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;
        }
        .sidebar .cat-item.active { background: #f0c040; color: #000; font-weight: bold; }
        .content-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-header {
            padding: 20px 18px; background: #181818; border-bottom: 2px solid #333;
            font-size: 30px; font-weight: bold; color: #f0c040; display: flex;
            align-items: center; justify-content: space-between;
        }
        .home-btn {
            background: #2a2a2a; border: 3px solid #f0c040; color: #f0c040;
            padding: 12px 22px; font-size: 24px; cursor: pointer; border-radius: 6px;
        }
        .content-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; }
        .stream-item, .episode-item {
            padding: 22px 14px; border-bottom: 2px solid #2a2a2a; cursor: pointer; font-size: 27px;
            display: flex; align-items: center;
        }
        .stream-item:hover, .episode-item:hover { background: #222; }
        .stream-item .num { width: 60px; text-align: center; color: #888; margin-right: 14px; }
        .stream-item .name { flex: 1; }
        .pagination {
            display: flex; justify-content: center; align-items: center;
            padding: 20px; background: #181818; border-top: 2px solid #333;
        }
        .pagination button {
            background: #2a2a2a; border: 2px solid #555; color: #fff;
            padding: 16px 30px; font-size: 24px; cursor: pointer; margin: 0 12px; border-radius: 6px;
        }
        .pagination button:disabled { opacity: 0.3; cursor: default; }
        .pagination .page-info { font-size: 24px; min-width: 140px; text-align: center; }

        /* ========== SEZON EKRANI ========== */
        #seasonsScreen.active { flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 24px; }
        .seasons-grid {
            display: flex; flex-wrap: wrap; justify-content: center;
            padding: 24px;
        }
        .season-box {
            background: #1e1e1e; border: 3px solid #444; padding: 36px 48px;
            cursor: pointer; font-size: 33px; border-radius: 10px; min-width: 200px;
            text-align: center; margin: 12px;
        }
        .season-box:hover { border-color: #f0c040; background: #2a2a2a; }

        /* ========== BOLUM EKRANI ========== */
        #episodesScreen.active { flex-direction: column; align-items: stretch; }
        .episodes-header {
            padding: 20px 18px; background: #181818; border-bottom: 2px solid #333;
            font-size: 30px; font-weight: bold; color: #f0c040; display: flex;
            align-items: center; justify-content: space-between;
        }
        .episodes-list { flex: 1; overflow-y: auto; padding: 12px; }
        .back-btn-text {
            background: #2a2a2a; border: 3px solid #f0c040; color: #f0c040;
            padding: 12px 22px; font-size: 24px; cursor: pointer; border-radius: 6px; margin: 20px;
        }

        /* ========== PLAYER ========== */
        #playerScreen.active { background: #000; justify-content: center; align-items: center; }
        #videoPlayer { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .player-container { position: relative; width: 100%; height: 100%; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: #f0c040; border: 3px solid #f0c040;
            padding: 16px 26px; font-size: 27px; cursor: pointer; z-index: 20; border-radius: 6px;
            display: none;
        }
        .player-container.show-controls .back-btn { display: block; }
        .video-controls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 24px 18px 18px; display: none; z-index: 15; flex-direction: column;
        }
        .player-container.show-controls .video-controls { display: flex; }
        .progress-row { display: flex; align-items: center; margin-bottom: 14px; }
        .progress-bar {
            flex: 1; height: 10px; background: #555; position: relative; cursor: pointer;
            margin: 0 14px; border-radius: 5px;
        }
        .progress-fill { height: 100%; background: #f0c040; width: 0%; border-radius: 5px; }
        .time-current, .time-duration { font-size: 24px; min-width: 80px; text-align: center; color: #fff; }
        .controls-row { display: flex; align-items: center; justify-content: center; }
        .ctrl-btn {
            background: transparent; border: 3px solid #aaa; color: #fff;
            font-size: 30px; padding: 14px 26px; cursor: pointer; border-radius: 6px;
            min-width: 80px; text-align: center; margin: 0 12px;
        }
        .ctrl-btn:hover { border-color: #f0c040; color: #f0c040; }
        .speed-indicator { font-size: 27px; color: #f0c040; min-width: 70px; text-align: center; }
        .error-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: #ff5c5c; padding: 30px 50px; font-size: 30px;
            border-radius: 10px; z-index: 25; display: none; text-align: center;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- ==================== LOGIN ==================== -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <h2>XTREAM IPTV</h2>
            <input type="text" id="panelNameInput" placeholder="Panel Adı (Abonelik İsmi)" tabindex="0">
            <input type="text" id="serverInput" placeholder="Sunucu Adresi (http://server:port)" tabindex="0">
            <input type="text" id="usernameInput" placeholder="Kullanıcı Adı" tabindex="0">
            <input type="password" id="passwordInput" placeholder="Şifre" tabindex="0">
            <button id="loginBtn" tabindex="0">GİRİŞ YAP ve KAYDET</button>
            <div class="error-msg" id="loginError"></div>
        </div>
        <div class="saved-panels" id="savedPanelsContainer">
            <h3>📋 Kayıtlı Panellerim</h3>
            <div id="savedPanelsList"></div>
        </div>
    </div>

    <!-- ==================== ANA MENU ==================== -->
    <div id="mainMenuScreen" class="screen">
        <button class="panel-switch-btn" id="panelSwitchBtn" tabindex="0">🔌 PANEL DEĞİŞTİR / ÇIKIŞ YAP</button>
        <button class="menu-btn" data-target="live" tabindex="0">📺 CANLI TV</button>
        <button class="menu-btn" data-target="vod" tabindex="0">🎬 SİNEMA (VOD)</button>
        <button class="menu-btn" data-target="series" tabindex="0">📚 DİZİLER</button>
    </div>

    <!-- ==================== LISTE EKRANI ==================== -->
    <div id="listScreen" class="screen">
        <div class="sidebar" id="categorySidebar"></div>
        <div class="content-panel">
            <div class="content-header">
                <span id="contentHeader">Kategoriler</span>
                <button class="home-btn" id="listHomeBtn" tabindex="0">🏠 ANA MENÜYE DÖN</button>
            </div>
            <div class="content-list" id="contentList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- ==================== SEZON EKRANI ==================== -->
    <div id="seasonsScreen" class="screen">
        <div class="content-header" style="width:100%;">
            <span id="seasonsHeader">Dizi Sezonları</span>
            <button class="home-btn" id="seasonsHomeBtn" tabindex="0">🏠 ANA MENÜYE DÖN</button>
        </div>
        <div class="seasons-grid" id="seasonsGrid"></div>
        <button class="back-btn-text" id="seasonsBackBtn" tabindex="0">⬅ DİZİ LİSTESİNE DÖN</button>
    </div>

    <!-- ==================== BOLUM EKRANI ==================== -->
    <div id="episodesScreen" class="screen">
        <div class="episodes-header">
            <span id="episodesHeader">Bölümler</span>
            <button class="home-btn" id="episodesHomeBtn" tabindex="0">🏠 ANA MENÜYE DÖN</button>
        </div>
        <div class="episodes-list" id="episodesListContainer"></div>
        <button class="back-btn-text" id="episodesBackBtn" tabindex="0">⬅ SEZONLARA DÖN</button>
    </div>

    <!-- ==================== PLAYER ==================== -->
    <div id="playerScreen" class="screen">
        <div class="player-container" id="playerContainer">
            <button class="back-btn" id="playerBackBtn" tabindex="0">⬅ KANAL LİSTESİNE DÖN</button>
            <video id="videoPlayer" preload="metadata"></video>
            <div class="video-controls" id="videoControls">
                <div class="progress-row">
                    <span class="time-current" id="timeCurrent">00:00</span>
                    <div class="progress-bar" id="progressBar" tabindex="0">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="time-duration" id="timeDuration">00:00</span>
                </div>
                <div class="controls-row">
                    <button class="ctrl-btn" id="playPauseBtn" tabindex="0">▶</button>
                    <span class="speed-indicator" id="speedIndicator">1.0x</span>
                    <button class="ctrl-btn" id="speedBtn" tabindex="0">⚡ Hız</button>
                </div>
            </div>
            <div class="error-overlay" id="errorOverlay">Yayın Hatası / Format Desteklenmiyor</div>
        </div>
    </div>
</div>

<script>
(function() {
    // ==================== GLOBAL DEGISKENLER (ES5) ====================
    var PROXY_URL = "";
    var API_BASE_URL = "";
    var USERNAME = "";
    var PASSWORD = "";
    var XTREAM_URL = "";

    var currentScreen = "login"; // login, main_menu, list, seasons, episodes, player
    var currentListType = "";    // live, vod, series
    var currentCategoryId = "";
    var currentCategoryName = "";
    var streamList = [];
    var currentPage = 1;
    var itemsPerPage = 30;
    var totalPages = 1;

    var currentSeriesId = "";
    var currentSeriesInfo = null;
    var currentSeasonNumber = null;
    var currentEpisodes = [];

    var historyStack = [];

    // Player degiskenleri
    var hideControlsTimeout = null;
    var videoElement = null;
    var targetPlaybackRate = 1.0; // hedef hiz (video hazir olunca uygulanacak)
    var playbackRateReady = false; // video hazir mi?

    // ==================== YARDIMCI FONKSIYONLAR ====================
    function getEl(id) { return document.getElementById(id); }

    function formatTime(seconds) {
        if (isNaN(seconds) || seconds < 0) return "00:00";
        var h = Math.floor(seconds / 3600);
        var m = Math.floor((seconds % 3600) / 60);
        var s = Math.floor(seconds % 60);
        function pad(num) { return (num < 10 ? "0" : "") + num; }
        if (h > 0) return pad(h) + ":" + pad(m) + ":" + pad(s);
        return pad(m) + ":" + pad(s);
    }

    function showScreen(screenId) {
        var screens = document.querySelectorAll('.screen');
        for (var i = 0; i < screens.length; i++) {
            screens[i].classList.remove('active');
        }
        getEl(screenId).classList.add('active');
    }

    function navigateTo(screen, screenId, pushHistory) {
        if (pushHistory === undefined) pushHistory = true;
        if (pushHistory && currentScreen !== screen) {
            historyStack.push(currentScreen);
        }
        currentScreen = screen;
        showScreen(screenId);
        // Ekran degistiginde ilk odaklanabilir elemana odaklan
        setTimeout(autoFocusFirst, 150);
    }

    function goBack() {
        if (currentScreen === 'player') {
            if (videoElement) {
                videoElement.pause();
                videoElement.src = '';
                videoElement.load();
            }
        }
        if (historyStack.length > 0) {
            var prev = historyStack.pop();
            var screenMap = {
                'login': 'loginScreen',
                'main_menu': 'mainMenuScreen',
                'list': 'listScreen',
                'seasons': 'seasonsScreen',
                'episodes': 'episodesScreen',
                'player': 'playerScreen'
            };
            var targetId = screenMap[prev] || 'mainMenuScreen';
            currentScreen = prev;
            showScreen(targetId);
            setTimeout(autoFocusFirst, 150);
        } else {
            currentScreen = 'main_menu';
            showScreen('mainMenuScreen');
            setTimeout(autoFocusFirst, 150);
        }
    }

    // ==================== ODAK YONETIMI (KUMANDA) ====================
    function getAllFocusable(container) {
        if (!container) container = document;
        var els = container.querySelectorAll(
            'button, .cat-item, .stream-item, .episode-item, .season-box, .saved-panel-item, ' +
            'input:not([type="hidden"]), .progress-bar, .menu-btn, .ctrl-btn, .back-btn, .home-btn, .back-btn-text'
        );
        var result = [];
        for (var i = 0; i < els.length; i++) {
            var el = els[i];
            // Sadece görünür ekrandaki ve aktif ekrandaki elementler
            if (el.offsetParent !== null && el.tabIndex >= 0) {
                result.push(el);
            }
        }
        return result;
    }

    function autoFocusFirst() {
        var focusable = getAllFocusable();
        if (focusable.length > 0) {
            focusable[0].focus();
        }
    }

    function focusNext(direction) {
        var focusable = getAllFocusable();
        if (focusable.length === 0) return;
        var activeEl = document.activeElement;
        var currentIndex = -1;
        for (var i = 0; i < focusable.length; i++) {
            if (focusable[i] === activeEl) {
                currentIndex = i;
                break;
            }
        }
        if (currentIndex === -1) {
            // Odaklanmis eleman yoksa ilk elemani odakla
            focusable[0].focus();
            return;
        }
        var newIndex = currentIndex;
        if (direction === 'up') newIndex = Math.max(0, currentIndex - 1);
        else if (direction === 'down') newIndex = Math.min(focusable.length - 1, currentIndex + 1);
        else if (direction === 'left') newIndex = Math.max(0, currentIndex - 1);
        else if (direction === 'right') newIndex = Math.min(focusable.length - 1, currentIndex + 1);

        if (newIndex >= 0 && newIndex < focusable.length) {
            focusable[newIndex].focus();
        }
    }

    // ==================== AJAX (XMLHttpRequest) ====================
    function ajaxGet(url, onSuccess, onError) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', PROXY_URL + url, true);
        xhr.timeout = 15000;
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        onSuccess(data);
                    } catch(e) {
                        if (onError) onError("JSON parse error");
                    }
                } else {
                    if (onError) onError("HTTP " + xhr.status);
                }
            }
        };
        xhr.onerror = function() { if (onError) onError("Baglanti hatasi"); };
        xhr.send();
    }

    // ==================== PANEL KAYDETME / YUKLEME ====================
    function loadSavedPanels() {
        var panelsStr = localStorage.getItem('iptv_panels');
        if (!panelsStr) return [];
        try {
            var panels = JSON.parse(panelsStr);
            return panels || [];
        } catch(e) { return []; }
    }

    function savePanel(panelName, server, user, pass) {
        var panels = loadSavedPanels();
        var found = false;
        for (var i = 0; i < panels.length; i++) {
            if (panels[i].name === panelName) {
                panels[i].server = server;
                panels[i].username = user;
                panels[i].password = pass;
                found = true;
                break;
            }
        }
        if (!found) {
            panels.push({ name: panelName, server: server, username: user, password: pass });
        }
        localStorage.setItem('iptv_panels', JSON.stringify(panels));
        renderSavedPanels();
    }

    function renderSavedPanels() {
        var container = getEl('savedPanelsList');
        if (!container) return;
        container.innerHTML = '';
        var panels = loadSavedPanels();
        if (panels.length === 0) {
            var emptyDiv = document.createElement('div');
            emptyDiv.style.cssText = 'padding:12px;color:#888;';
            emptyDiv.textContent = 'Henuz kayitli panel yok.';
            container.appendChild(emptyDiv);
            return;
        }
        for (var i = 0; i < panels.length; i++) {
            (function(panel) {
                var div = document.createElement('div');
                div.className = 'saved-panel-item';
                div.setAttribute('tabindex', '0');
                div.textContent = panel.name + ' (' + panel.server + ')';
                div.onclick = function() {
                    getEl('panelNameInput').value = panel.name;
                    getEl('serverInput').value = panel.server;
                    getEl('usernameInput').value = panel.username;
                    getEl('passwordInput').value = panel.password;
                    doLogin();
                };
                div.onkeydown = function(e) {
                    if (e.keyCode === 13) {
                        getEl('panelNameInput').value = panel.name;
                        getEl('serverInput').value = panel.server;
                        getEl('usernameInput').value = panel.username;
                        getEl('passwordInput').value = panel.password;
                        doLogin();
                    }
                };
                container.appendChild(div);
            })(panels[i]);
        }
    }

    // ==================== GIRIS ISLEMLERI ====================
    function doLogin() {
        var panelName = getEl('panelNameInput').value.trim();
        var server = getEl('serverInput').value.trim();
        var user = getEl('usernameInput').value.trim();
        var pass = getEl('passwordInput').value.trim();
        var errorEl = getEl('loginError');

        if (!panelName) { errorEl.textContent = 'Panel adi girin!'; return; }
        if (!server || !user || !pass) { errorEl.textContent = 'Tum alanlari doldurun!'; return; }

        if (server.charAt(server.length - 1) === '/') server = server.slice(0, -1);
        XTREAM_URL = server;
        API_BASE_URL = server + '/player_api.php?username=' + encodeURIComponent(user) + '&password=' + encodeURIComponent(pass);
        USERNAME = user;
        PASSWORD = pass;

        errorEl.textContent = 'Giris yapiliyor...';

        ajaxGet(API_BASE_URL, function(data) {
            if (data.user_info && data.user_info.auth === 1) {
                savePanel(panelName, server, user, pass);
                errorEl.textContent = '';
                historyStack = [];
                navigateTo('main_menu', 'mainMenuScreen', false);
            } else {
                errorEl.textContent = 'Giris basarisiz! Bilgileri kontrol edin.';
            }
        }, function(err) {
            errorEl.textContent = 'Hata: ' + err;
        });
    }

    function logoutToLogin() {
        // Oturumu kapat, login ekranina don
        historyStack = [];
        currentScreen = 'login';
        showScreen('loginScreen');
        renderSavedPanels();
        setTimeout(autoFocusFirst, 150);
    }

    // ==================== MENU ISLEMLERI ====================
    function onMainMenuClick(target) {
        currentListType = target;
        currentCategoryId = '';
        currentPage = 1;
        streamList = [];
        historyStack = ['main_menu'];
        if (target === 'live') {
            loadCategories('get_live_categories', 'Canli TV Kategorileri');
        } else if (target === 'vod') {
            loadCategories('get_vod_categories', 'VOD Kategorileri');
        } else if (target === 'series') {
            loadCategories('get_series_categories', 'Dizi Kategorileri');
        }
        navigateTo('list', 'listScreen', false);
    }

    function loadCategories(action, headerTitle) {
        getEl('contentHeader').textContent = headerTitle;
        getEl('categorySidebar').innerHTML = '';
        getEl('contentList').innerHTML = '';
        getEl('pagination').innerHTML = '';
        var url = API_BASE_URL + '&action=' + action;
        ajaxGet(url, function(data) {
            var cats = data || [];
            var sidebar = getEl('categorySidebar');
            for (var i = 0; i < cats.length; i++) {
                var cat = cats[i];
                var div = document.createElement('div');
                div.className = 'cat-item';
                div.setAttribute('tabindex', '0');
                div.textContent = cat.category_name;
                div.setAttribute('data-cat-id', cat.category_id);
                div.onclick = (function(id, name) {
                    return function() { selectCategory(id, name); };
                })(cat.category_id, cat.category_name);
                div.onkeydown = (function(id, name) {
                    return function(e) {
                        if (e.keyCode === 13) { selectCategory(id, name); }
                    };
                })(cat.category_id, cat.category_name);
                sidebar.appendChild(div);
            }
            if (cats.length > 0) {
                selectCategory(cats[0].category_id, cats[0].category_name);
            }
            setTimeout(autoFocusFirst, 100);
        });
    }

    function selectCategory(catId, catName) {
        currentCategoryId = catId;
        currentCategoryName = catName;
        currentPage = 1;
        var items = document.querySelectorAll('#categorySidebar .cat-item');
        for (var i = 0; i < items.length; i++) {
            items[i].classList.remove('active');
            if (items[i].getAttribute('data-cat-id') == catId) {
                items[i].classList.add('active');
            }
        }
        loadStreamsForCategory();
    }

    function loadStreamsForCategory() {
        var action = '';
        if (currentListType === 'live') action = 'get_live_streams';
        else if (currentListType === 'vod') action = 'get_vod_streams';
        else if (currentListType === 'series') action = 'get_series';
        var url = API_BASE_URL + '&action=' + action + '&category_id=' + currentCategoryId;
        getEl('contentList').innerHTML = 'Yukleniyor...';
        getEl('pagination').innerHTML = '';
        ajaxGet(url, function(data) {
            streamList = data || [];
            totalPages = Math.ceil(streamList.length / itemsPerPage) || 1;
            currentPage = 1;
            renderPage();
            setTimeout(autoFocusFirst, 100);
        });
    }

    function renderPage() {
        var listEl = getEl('contentList');
        listEl.innerHTML = '';
        var start = (currentPage - 1) * itemsPerPage;
        var end = Math.min(start + itemsPerPage, streamList.length);
        var slice = streamList.slice(start, end);
        for (var i = 0; i < slice.length; i++) {
            var item = slice[i];
            var div = document.createElement('div');
            div.className = 'stream-item';
            div.setAttribute('tabindex', '0');
            var numSpan = document.createElement('span');
            numSpan.className = 'num';
            numSpan.textContent = (start + i + 1);
            var nameSpan = document.createElement('span');
            nameSpan.className = 'name';
            nameSpan.textContent = item.name || item.title || 'Isimsiz';
            div.appendChild(numSpan);
            div.appendChild(nameSpan);
            div.onclick = (function(it) {
                return function() { onStreamClick(it); };
            })(item);
            div.onkeydown = (function(it) {
                return function(e) {
                    if (e.keyCode === 13) { onStreamClick(it); }
                };
            })(item);
            listEl.appendChild(div);
        }
        var pag = getEl('pagination');
        pag.innerHTML = '';
        var prevBtn = document.createElement('button');
        prevBtn.textContent = '◄ Onceki';
        prevBtn.setAttribute('tabindex', '0');
        prevBtn.disabled = (currentPage === 1);
        prevBtn.onclick = function() { if (currentPage > 1) { currentPage--; renderPage(); listEl.scrollTop = 0; } };
        var pageInfo = document.createElement('span');
        pageInfo.className = 'page-info';
        pageInfo.textContent = currentPage + ' / ' + totalPages;
        var nextBtn = document.createElement('button');
        nextBtn.textContent = 'Sonraki ►';
        nextBtn.setAttribute('tabindex', '0');
        nextBtn.disabled = (currentPage === totalPages);
        nextBtn.onclick = function() { if (currentPage < totalPages) { currentPage++; renderPage(); listEl.scrollTop = 0; } };
        pag.appendChild(prevBtn);
        pag.appendChild(pageInfo);
        pag.appendChild(nextBtn);
    }

    function onStreamClick(item) {
        if (currentListType === 'series') {
            currentSeriesId = item.series_id;
            loadSeriesSeasons(currentSeriesId);
        } else {
            var streamUrl = '';
            if (currentListType === 'live') {
                if (item.stream_type === 'live' || item.stream_type === 'movie') {
                    streamUrl = item.stream_url || (XTREAM_URL + '/live/' + USERNAME + '/' + PASSWORD + '/' + item.stream_id + '.ts');
                } else {
                    streamUrl = item.stream_url || (XTREAM_URL + '/movie/' + USERNAME + '/' + PASSWORD + '/' + item.stream_id + '.' + (item.container_extension || 'mp4'));
                }
            } else if (currentListType === 'vod') {
                streamUrl = item.stream_url || (XTREAM_URL + '/movie/' + USERNAME + '/' + PASSWORD + '/' + item.stream_id + '.' + (item.container_extension || 'mp4'));
            }
            openPlayer(streamUrl, item.name || item.title);
        }
    }

    // ==================== DIZI ISLEMLERI (SADECE ES5 for...in) ====================
    function loadSeriesSeasons(seriesId) {
        var url = API_BASE_URL + '&action=get_series_info&series_id=' + seriesId;
        getEl('seasonsHeader').textContent = 'Yukleniyor...';
        navigateTo('seasons', 'seasonsScreen');
        ajaxGet(url, function(data) {
            currentSeriesInfo = data;
            if (data.info && data.info.name) {
                getEl('seasonsHeader').textContent = data.info.name;
            }
            renderSeasons(data);
            setTimeout(autoFocusFirst, 100);
        });
    }

    function renderSeasons(data) {
        var grid = getEl('seasonsGrid');
        grid.innerHTML = '';
        var seasons = data.seasons;
        if (!seasons || seasons.length === 0) {
            var episodesObj = data.episodes || {};
            var seasonNums = [];
            for (var sn in episodesObj) {
                if (episodesObj.hasOwnProperty(sn)) {
                    seasonNums.push(sn);
                }
            }
            seasonNums.sort(function(a,b){ return parseInt(a)-parseInt(b); });
            for (var i = 0; i < seasonNums.length; i++) {
                var snum = seasonNums[i];
                var div = document.createElement('div');
                div.className = 'season-box';
                div.setAttribute('tabindex', '0');
                div.textContent = 'Sezon ' + snum;
                div.onclick = (function(seasonNum) {
                    return function() { onSeasonClick(seasonNum); };
                })(snum);
                div.onkeydown = (function(seasonNum) {
                    return function(e) {
                        if (e.keyCode === 13) { onSeasonClick(seasonNum); }
                    };
                })(snum);
                grid.appendChild(div);
            }
        } else {
            for (var j = 0; j < seasons.length; j++) {
                var season = seasons[j];
                var snum = season.season_number;
                var div = document.createElement('div');
                div.className = 'season-box';
                div.setAttribute('tabindex', '0');
                div.textContent = season.name || ('Sezon ' + snum);
                div.onclick = (function(seasonNum) {
                    return function() { onSeasonClick(seasonNum); };
                })(snum);
                div.onkeydown = (function(seasonNum) {
                    return function(e) {
                        if (e.keyCode === 13) { onSeasonClick(seasonNum); }
                    };
                })(snum);
                grid.appendChild(div);
            }
        }
    }

    function onSeasonClick(seasonNumber) {
        currentSeasonNumber = seasonNumber;
        var episodesObj = currentSeriesInfo.episodes || {};
        currentEpisodes = [];
        var key = String(seasonNumber);
        if (episodesObj[key]) {
            currentEpisodes = episodesObj[key];
        } else {
            for (var k in episodesObj) {
                if (episodesObj.hasOwnProperty(k) && parseInt(k) === parseInt(seasonNumber)) {
                    currentEpisodes = episodesObj[k];
                    break;
                }
            }
        }
        renderEpisodes();
        navigateTo('episodes', 'episodesScreen');
    }

    function renderEpisodes() {
        getEl('episodesHeader').textContent = 'Sezon ' + currentSeasonNumber + ' Bolumleri';
        var container = getEl('episodesListContainer');
        container.innerHTML = '';
        if (currentEpisodes.length === 0) {
            var emptyDiv = document.createElement('div');
            emptyDiv.style.cssText = 'padding:24px;';
            emptyDiv.textContent = 'Bolum bulunamadi.';
            container.appendChild(emptyDiv);
            return;
        }
        for (var i = 0; i < currentEpisodes.length; i++) {
            var ep = currentEpisodes[i];
            var div = document.createElement('div');
            div.className = 'episode-item';
            div.setAttribute('tabindex', '0');
            div.textContent = (ep.title || ('Bolum ' + ep.episode_num));
            div.onclick = (function(epCopy) {
                return function() { playEpisode(epCopy); };
            })(ep);
            div.onkeydown = (function(epCopy) {
                return function(e) {
                    if (e.keyCode === 13) { playEpisode(epCopy); }
                };
            })(ep);
            container.appendChild(div);
        }
        setTimeout(autoFocusFirst, 100);
    }

    function playEpisode(ep) {
        var containerExt = ep.container_extension || 'mp4';
        var streamUrl = XTREAM_URL + '/series/' + USERNAME + '/' + PASSWORD + '/' + ep.id + '.' + containerExt;
        openPlayer(streamUrl, ep.title || 'Bolum');
    }

    // ==================== PLAYER ISLEMLERI ====================
    function openPlayer(url, title) {
        // Hiz ayarini sifirla
        targetPlaybackRate = 1.0;
        playbackRateReady = false;

        navigateTo('player', 'playerScreen');
        videoElement = getEl('videoPlayer');
        getEl('errorOverlay').style.display = 'none';
        getEl('speedIndicator').textContent = '1.0x';

        videoElement.src = url;
        videoElement.load();
        videoElement.play();

        if (window.history && window.history.pushState) {
            window.history.pushState({ playerOpen: true }, '', '#player');
        }
        showControlsTemporarily();
        updatePlayPauseButton();
    }

    function applyPlaybackRate() {
        if (videoElement && playbackRateReady && targetPlaybackRate > 0) {
            try {
                videoElement.playbackRate = targetPlaybackRate;
                getEl('speedIndicator').textContent = targetPlaybackRate.toFixed(1) + 'x';
            } catch(e) {
                // Hata durumunda sessizce devam et
            }
        }
    }

    function closePlayerAndGoBack() {
        if (videoElement) {
            videoElement.pause();
            videoElement.src = '';
            videoElement.load();
        }
        if (window.history && window.history.state && window.history.state.playerOpen) {
            window.history.back();
        }
        targetPlaybackRate = 1.0;
        playbackRateReady = false;
        goBack();
    }

    function showControlsTemporarily() {
        var container = getEl('playerContainer');
        container.classList.add('show-controls');
        if (hideControlsTimeout) clearTimeout(hideControlsTimeout);
        hideControlsTimeout = setTimeout(function() {
            container.classList.remove('show-controls');
        }, 5000);
    }

    function updatePlayPauseButton() {
        var btn = getEl('playPauseBtn');
        if (videoElement && videoElement.paused) btn.textContent = '▶';
        else btn.textContent = '⏸';
    }

    function setupPlayerEvents() {
        videoElement = getEl('videoPlayer');

        // Video hazir oldugunda playbackRate uygula
        videoElement.onloadedmetadata = function() {
            playbackRateReady = true;
            applyPlaybackRate();
        };
        videoElement.oncanplay = function() {
            playbackRateReady = true;
            applyPlaybackRate();
        };
        videoElement.onplaying = function() {
            playbackRateReady = true;
            applyPlaybackRate();
        };

        videoElement.ontimeupdate = function() {
            var cur = videoElement.currentTime;
            var dur = videoElement.duration;
            getEl('timeCurrent').textContent = formatTime(cur);
            if (dur && !isNaN(dur)) {
                getEl('timeDuration').textContent = formatTime(dur);
                getEl('progressFill').style.width = ((cur / dur) * 100) + '%';
            }
        };
        videoElement.onplay = updatePlayPauseButton;
        videoElement.onpause = updatePlayPauseButton;
        videoElement.onended = updatePlayPauseButton;
        videoElement.onerror = function() {
            getEl('errorOverlay').style.display = 'block';
        };
    }

    function initPlayerControls() {
        getEl('playPauseBtn').onclick = function() {
            if (videoElement.paused) videoElement.play(); else videoElement.pause();
            updatePlayPauseButton();
            showControlsTemporarily();
        };
        getEl('speedBtn').onclick = function() {
            var rates = [1.0, 1.5, 2.0];
            var cur = targetPlaybackRate;
            var idx = -1;
            for (var r = 0; r < rates.length; r++) {
                if (Math.abs(rates[r] - cur) < 0.01) { idx = r; break; }
            }
            var newRate = rates[(idx + 1) % rates.length];
            targetPlaybackRate = newRate;
            getEl('speedIndicator').textContent = newRate.toFixed(1) + 'x';
            if (playbackRateReady && videoElement) {
                try { videoElement.playbackRate = newRate; } catch(e) {}
            }
            showControlsTemporarily();
        };
        getEl('progressBar').onclick = function(e) {
            var rect = this.getBoundingClientRect();
            var clickX = e.clientX - rect.left;
            var width = rect.width;
            var dur = videoElement.duration;
            if (dur && !isNaN(dur)) videoElement.currentTime = (clickX / width) * dur;
            showControlsTemporarily();
        };
        getEl('playerBackBtn').onclick = function() { closePlayerAndGoBack(); };

        var container = getEl('playerContainer');
        container.onmousemove = showControlsTemporarily;
        container.onmousedown = showControlsTemporarily;
        container.onclick = showControlsTemporarily;
    }

    // ==================== ANA MENU BUTONLARI ====================
    function bindHomeButtons() {
        getEl('listHomeBtn').onclick = function() {
            historyStack = [];
            navigateTo('main_menu', 'mainMenuScreen', false);
        };
        getEl('seasonsHomeBtn').onclick = function() {
            historyStack = [];
            navigateTo('main_menu', 'mainMenuScreen', false);
        };
        getEl('episodesHomeBtn').onclick = function() {
            historyStack = [];
            navigateTo('main_menu', 'mainMenuScreen', false);
        };
        getEl('seasonsBackBtn').onclick = function() { goBack(); };
        getEl('episodesBackBtn').onclick = function() { goBack(); };

        // Panel degistirme butonu
        getEl('panelSwitchBtn').onclick = function() {
            logoutToLogin();
        };
    }

    // ==================== KLAVYE / KUMANDA EVENTS ====================
    function bindGlobalKeyboard() {
        window.addEventListener('keydown', function(e) {
            var key = e.keyCode;

            // === PLAYER OZEL TUSLARI ===
            if (currentScreen === 'player') {
                if (key === 37) { // sol
                    if (videoElement) videoElement.currentTime = Math.max(0, videoElement.currentTime - 10);
                    showControlsTemporarily();
                    e.preventDefault();
                    return;
                } else if (key === 39) { // sag
                    if (videoElement) videoElement.currentTime = Math.min(videoElement.duration, videoElement.currentTime + 10);
                    showControlsTemporarily();
                    e.preventDefault();
                    return;
                } else if (key === 13) { // enter
                    if (videoElement) {
                        if (videoElement.paused) videoElement.play(); else videoElement.pause();
                        updatePlayPauseButton();
                        showControlsTemporarily();
                    }
                    e.preventDefault();
                    return;
                } else if (key === 27 || key === 461) { // escape veya LG back
                    closePlayerAndGoBack();
                    e.preventDefault();
                    return;
                }
            }

            // === STANDART KUMANDA YON TUSLARI (TUM EKRANLAR) ===
            if (key === 38) { // yukari
                focusNext('up');
                e.preventDefault();
            } else if (key === 40) { // asagi
                focusNext('down');
                e.preventDefault();
            } else if (key === 37 && currentScreen !== 'player') { // sol
                focusNext('left');
                e.preventDefault();
            } else if (key === 39 && currentScreen !== 'player') { // sag
                focusNext('right');
                e.preventDefault();
            } else if (key === 27 || key === 461) { // escape veya LG back (player disinda)
                if (currentScreen !== 'login' && currentScreen !== 'main_menu') {
                    goBack();
                    e.preventDefault();
                }
            } else if (key === 13) {
                // Enter tusu: odaklanmis elemanin click'ini tetikle
                var activeEl = document.activeElement;
                if (activeEl && activeEl !== document.body && activeEl.click) {
                    activeEl.click();
                }
                e.preventDefault();
            }
        });
    }

    // ==================== BASLANGIC ====================
    function init() {
        renderSavedPanels();

        // Login buton
        getEl('loginBtn').addEventListener('click', doLogin);
        var inputs = [getEl('panelNameInput'), getEl('serverInput'), getEl('usernameInput'), getEl('passwordInput')];
        for (var i = 0; i < inputs.length; i++) {
            inputs[i].addEventListener('keypress', function(e) {
                if (e.keyCode === 13) doLogin();
            });
        }

        // Ana menu butonlari
        var menuBtns = document.querySelectorAll('#mainMenuScreen .menu-btn');
        for (var j = 0; j < menuBtns.length; j++) {
            menuBtns[j].addEventListener('click', function() {
                var target = this.getAttribute('data-target');
                onMainMenuClick(target);
            });
            menuBtns[j].addEventListener('keydown', function(e) {
                if (e.keyCode === 13) {
                    var target = this.getAttribute('data-target');
                    onMainMenuClick(target);
                }
            });
        }

        bindHomeButtons();
        setupPlayerEvents();
        initPlayerControls();
        bindGlobalKeyboard();

        showScreen('loginScreen');
        setTimeout(autoFocusFirst, 200);
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        init();
    } else {
        window.onload = init;
    }
})();
</script>
</body>
